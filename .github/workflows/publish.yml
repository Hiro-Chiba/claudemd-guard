name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Node 24 ships npm 11.x. OIDC trusted publishing requires
          # npm >= 11.5.1 per https://docs.npmjs.com/trusted-publishers/.
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        # npm ci is strict about platform-specific optional deps in the
        # lock file. jiti's @rolldown/* transitive deps resolve to
        # different @emnapi versions on macOS vs Linux runners, which
        # makes npm ci fail on the Linux CI even when the lock file is
        # in sync on the maintainer's mac. npm install tolerates this
        # drift while still using the lock file as a constraint.
        run: npm install --no-audit --no-fund --no-progress

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [[ "$TAG_VERSION" != "$PKG_VERSION" ]]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Publishing version $PKG_VERSION"

      - name: Run checks
        run: npm run checks

      - name: Build
        run: npm run build

      # OIDC trusted publishing: no NPM_TOKEN needed. The id-token:write
      # permission at the workflow level lets the npm CLI request an
      # OIDC token from GitHub and present it to the npm registry.
      # Provenance is generated automatically when publishing via a
      # trusted publisher; the --provenance flag is therefore optional.
      - name: Publish
        run: npm publish --access public
